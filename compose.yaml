# =============================================================
#  要件定義サポートAI — Docker Compose
# -------------------------------------------------------------
#  構成:  Hermes Agent(TUI) → Ollama → ローカルLLM
#  - 対話は Hermes を TUI で直接使う（スキル /grill 等はこの経路で発火する）。
#  - Open WebUI は廃止（gateway の APIサーバ経由ではスキルが発火しなかったため）。
#    gateway プロセスは s6 監視下の「idle 常駐」用途のみ（APIサーバ無効・外部公開なし・鍵不要）。
#
#  使い方:
#    docker compose up -d                    # ollama + hermes(idle常駐)
#    docker compose exec -it hermes bash     # hermes コンテナに入る
#    hermes --tui                            # 対話TUI（/grill, /torishirabe が発火）
# =============================================================

services:
  # ===== Ollama: ローカル LLM サーバ（常駐） =====
  ollama:
    image: ollama/ollama:latest          # 公式ビルド済みイメージ（Dockerfile 不要）
    container_name: ollama
    ports:
      - "11434:11434"                    # ホスト → コンテナ。APIをホストからも叩ける
    volumes:
      - ollama_data:/root/.ollama        # ★モデル保存先を永続化（消えると毎回再DL）
    restart: unless-stopped
    environment:
      - OLLAMA_CONTEXT_LENGTH=65536       # 64K。Hermesはツール使用に64k以上を要求
      - OLLAMA_NUM_PARALLEL=2
      - OLLAMA_FLASH_ATTENTION=1
      - OLLAMA_KV_CACHE_TYPE=q8_0

    # --- GPU（前提: WSL2側に nvidia-container-toolkit 導入済み + Docker再起動済み）---
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # ===== Hermes Agent: エージェント本体（idle 常駐 → exec で対話） =====
  #  `gateway run` は s6 監視下で「idle 常駐（sleep infinity ハートビート）」になる公式パターン。
  #  API_SERVER_* もメッセージング token も設定しない ＝ APIサーバもメッセージングも起動しない
  #  （外部公開なし・鍵不要）。コンテナを起こしておくためだけに gateway を使う。
  #  使い方:
  #    docker compose up -d                    # ollama + hermes(idle常駐)
  #    docker compose exec -it hermes bash     # 入る
  #    hermes --tui                            # 対話TUI（スキル /grill, /torishirabe が発火）
  #  スキル: ./hermes-config/skills/<name>/SKILL.md（= /opt/data/skills/）が /<name> に自動登録。
  hermes:
    image: nousresearch/hermes-agent:latest   # 公式イメージ（Dockerfile 不要）
    container_name: hermes
    depends_on:
      - ollama
    command: ["gateway", "run"]          # s6監視下で idle 常駐（API/メッセージング未設定＝起動しない）
    environment:
      - PUID=1000                         # /opt/data 配下の生成物をホスト側で扱えるように（id -u）
      - PGID=1000                         # id -g
    volumes:
      - ./hermes-config:/opt/data          # config.yaml / skills/ / 生成物(grill/) を永続化
    restart: unless-stopped

volumes:
  ollama_data:                            # Ollama のモデル永続化ボリューム
