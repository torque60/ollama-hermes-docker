# =============================================================
#  要件定義サポートAI — Docker Compose
# -------------------------------------------------------------
#  構成:  Hermes Agent(TUI) → Ollama → ローカルLLM
#  - ollama は常駐。hermes は「その都度 1プロセスだけ」起こして対話する（run方式）。
#    → hermes を2つ同時に動かさない = /opt/data(セッション/メモリ)の同時書込みを回避。
#  - Open WebUI は廃止（gateway の APIサーバ経由ではスキルが発火しなかったため）。
#
#  使い方:
#    docker compose up -d                       # ollama だけ常駐
#    docker compose run --rm -it hermes bash    # hermes を1個起こして入る
#    hermes --tui                               # 対話TUI（/n-torishirabe, /torishirabe 発火）
#    # 一発でTUIに入るなら: docker compose run --rm -it hermes --tui
# =============================================================

services:
  # ===== Ollama: ローカル LLM サーバ（常駐） =====
  ollama:
    image: ollama/ollama:latest          # 公式ビルド済みイメージ（Dockerfile 不要）
    container_name: ollama
    ports:
      - "11434:11434"                    # ホスト → コンテナ。APIをホストからも叩ける
    volumes:
      - ollama_data:/root/.ollama        # ★モデル保存先を永続化（消えると毎回再DL）
    restart: unless-stopped
    environment:
      - OLLAMA_CONTEXT_LENGTH=65536       # 64K。Hermesはツール使用に64k以上を要求
      - OLLAMA_NUM_PARALLEL=2
      - OLLAMA_FLASH_ATTENTION=1
      - OLLAMA_KV_CACHE_TYPE=q8_0

    # --- GPU（前提: WSL2側に nvidia-container-toolkit 導入済み + Docker再起動済み）---
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # ===== Hermes Agent: エージェント本体（run で1プロセスだけ起こす） =====
  #  profiles:["cli"] なので `docker compose up -d` では起動しない。
  #  `docker compose run` で明示的に、その都度1つだけ起動する（run -it が対話TTYを担う）。
  #    docker compose run --rm -it hermes bash    # 入ってから hermes --tui
  #    docker compose run --rm -it hermes --tui   # 直接TUI
  #  なぜ常駐にしないか: keep-alive常駐 + 別の hermes --tui = 2プロセスになり、
  #  /opt/data のセッション/メモリが同時書込みで競合する（公式が非対応と警告）。run方式は常に1プロセス。
  #  --rm でコンテナは毎回破棄されるが、設定/skills/memory は ./hermes-config、
  #  成果物(引継ぎ書/決定ログ)は ./vault に残るので状態は失われない。
  #  スキル: ./hermes-config/skills/<name>/SKILL.md が /<name> に自動登録。
  hermes:
    image: nousresearch/hermes-agent:latest   # 公式イメージ（Dockerfile 不要）
    profiles: ["cli"]                    # up -d では起動しない。run で1プロセスだけ起こす
    depends_on:
      - ollama
    environment:
      - PUID=1000                         # /opt/data 配下の生成物をホスト側で扱えるように（id -u）
      - PGID=1000                         # id -g
    volumes:
      - ./hermes-config:/opt/data          # 設定系: config.yaml / skills/ を永続化
      - ./vault:/vault                     # 成果物: 引継ぎ書/決定ログ（将来の Obsidian vault）

volumes:
  ollama_data:                            # Ollama のモデル永続化ボリューム
